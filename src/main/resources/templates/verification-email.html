<!DOCTYPE html>
<html xmlns:th="http://www.w3.org/1999/xhtml" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Verify your account</title>
</head>
<body style="margin:0; font-family: Arial, sans-serif; background-color:#f4f4f4;">
    <div style="max-width:400px; margin:50px auto; background:#ffffff; padding:30px; border-radius:10px; text-align:center; box-shadow:0 4px 10px rgba(0,0,0,0.1);">
        <h1>Welcome to Pump App 💪🏻</h1>
        <h3 style="margin-bottom:10px;">Verify your account</h3>

        <p style="font-size:14px; color:#555;">
            Click the button below to verify your account:
        </p>

        <a th:href="${verificationLink}"
           style="display:inline-block; margin-top:20px; padding:12px 20px; background:#4CAF50; color:white; text-decoration:none; border-radius:6px; font-weight:bold;">
            Verify Account
        </a>

        <p style="margin-top:20px; font-size:12px; color:#888;">
            If you didn’t request this, you can ignore this email.
        </p>
    </div>
</body>
</html>
